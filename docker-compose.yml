services:
  skillhub:
    build: .
    volumes:
      - skillhub-data:/data/db
      - skillhub-skills:/data/skills
    environment:
      - SKILLHUB_HOST=0.0.0.0
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "${SKILLHUB_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - skillhub
    restart: unless-stopped

volumes:
  skillhub-data:
  skillhub-skills:
